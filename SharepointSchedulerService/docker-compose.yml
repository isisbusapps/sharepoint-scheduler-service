services:
  sharepoint-scheduler-service:
    image: sharepointschedulerservice:latest
    build:
      context: SharepointSchedulerService
    container_name: sharepoint-scheduler-service
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS: "http://+:8080"
